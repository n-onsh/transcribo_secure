global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: 'backend-api'
    static_configs:
      - targets: ['storage-api:8080']
    metrics_path: '/metrics'
    scheme: 'http'

  - job_name: 'transcriber'
    static_configs:
      - targets: ['transcriber:8080']
    metrics_path: '/metrics'
    scheme: 'http'

  # System monitoring
  - job_name: 'node-exporter'
    static_configs:
      - targets: ['node-exporter:9100']

  # Container monitoring
  - job_name: 'cadvisor'
    static_configs:
      - targets: ['cadvisor:8080']