services:
  traefik:
    image: traefik:v2.11.0
    container_name: transcribo-secure-traefik
    command:
      # For local dev only
      - "--api.insecure=true"
      
      # Use Docker as a provider
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"
      
      # File provider for self-signed cert
      - "--providers.file.directory=/etc/traefik/dynamic"
      - "--providers.file.watch=true"

      # Entrypoints
      - "--entrypoints.web.address=:80"
      - "--entrypoints.web.http.redirections.entryPoint.to=websecure"
      - "--entrypoints.web.http.redirections.entryPoint.scheme=https"
      - "--entrypoints.websecure.address=:443"

      # (Comment out ACME for local dev)
      # - "--certificatesresolvers.myresolver.acme.tlschallenge=true"
      # - "--certificatesresolvers.myresolver.acme.email=you@example.com"
      # - "--certificatesresolvers.myresolver.acme.storage=/letsencrypt/acme.json"

    ports:
      - "80:80"
      - "443:443"
      - "8080:8080" # Traefik dashboard (dev only)
    volumes:
      - "./infrastructure/docker/traefik/selfsigned:/etc/traefik/dynamic:ro"
      # - "./infrastructure/docker/letsencrypt:/letsencrypt"
      - "/var/run/docker.sock:/var/run/docker.sock:ro"
    networks:
      - transcribo-secure-network
    # No need for labels here, but you could add them if needed.

  postgres:
    image: postgres:15
    container_name: transcribo-secure-postgres
    environment:
      - POSTGRES_USER=transcribo_user
      - POSTGRES_PASSWORD=your_secure_password
      - POSTGRES_DB=transcribo
    volumes:
    - postgres_data:/var/lib/postgresql/data
    - ./infrastructure/docker/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - transcribo-secure-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 5s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio
    container_name: transcribo-secure-minio
    command: server --console-address ":9001" /data
    environment:
      - MINIO_ROOT_USER=${MINIO_ROOT_USER}
      - MINIO_ROOT_PASSWORD=${MINIO_ROOT_PASSWORD}
    volumes:
      - "./infrastructure/docker/.minio/data:/data"
    networks:
      - transcribo-secure-network
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.minio-api.rule=Host(`minio-api.localhost`)"
      - "traefik.http.routers.minio-api.service=minio-api-service"
      - "traefik.http.services.minio-api-service.loadbalancer.server.port=9000"
      - "traefik.http.routers.minio-api.entrypoints=websecure"
      - "traefik.http.routers.minio-api.tls=true"

      - "traefik.http.routers.minio-console.rule=Host(`minio-console.localhost`)"
      - "traefik.http.routers.minio-console.service=minio-console-service"
      - "traefik.http.services.minio-console-service.loadbalancer.server.port=9001"
      - "traefik.http.routers.minio-console.entrypoints=websecure"
      - "traefik.http.routers.minio-console.tls=true"

  backend-api:
    build:
      context: "./backend-api"
      dockerfile: "Dockerfile"
    container_name: transcribo-secure-backend-api
    environment:
      - POSTGRES_HOST=${POSTGRES_HOST}
      - POSTGRES_PORT=${POSTGRES_PORT}
      - POSTGRES_DB=${POSTGRES_DB}
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - MINIO_HOST=${MINIO_HOST}
      - MINIO_PORT=${MINIO_PORT}
      - MINIO_ACCESS_KEY=${MINIO_ROOT_USER}
      - MINIO_SECRET_KEY=${MINIO_ROOT_PASSWORD}
      - AZURE_KEYVAULT_URL=${AZURE_KEYVAULT_URL}
      - AZURE_TENANT_ID=${AZURE_TENANT_ID}
      - AZURE_CLIENT_ID=${AZURE_CLIENT_ID}
      - AZURE_CLIENT_SECRET=${AZURE_CLIENT_SECRET}
      - HF_AUTH_TOKEN=${HF_AUTH_TOKEN}
      - MAX_UPLOAD_SIZE=${MAX_UPLOAD_SIZE}
    depends_on:
      - postgres
      - minio
    networks:
      - transcribo-secure-network
    volumes:
      - "./backend-api:/app"
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.backend-api.rule=Host(`api.localhost`)"
      - "traefik.http.routers.backend-api.entrypoints=websecure"
      - "traefik.http.routers.backend-api.tls=true"
      - "traefik.http.services.backend-api.loadbalancer.server.port=8080"
    env_file:
      - ".env"
    command: >
      sh -c "env && python -m src.main"

  frontend:
    build:
      context: "./frontend"
      dockerfile: "Dockerfile"
    container_name: transcribo-secure-frontend
    environment:
      - BACKEND_API_URL=${BACKEND_API_URL}
      - REFRESH_INTERVAL=${REFRESH_INTERVAL}
    volumes:
      - "./frontend:/app"
    networks:
      - transcribo-secure-network
    depends_on:
      - backend-api
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.frontend.rule=Host(`app.localhost`)"
      - "traefik.http.routers.frontend.entrypoints=websecure"
      - "traefik.http.routers.frontend.tls=true"
      - "traefik.http.services.frontend.loadbalancer.server.port=8501"

  transcriber:
    build:
      context: "./transcriber"
      dockerfile: "Dockerfile"
    container_name: transcribo-secure-transcriber
    environment:
      - BACKEND_API_URL=${BACKEND_API_URL}
      - DEVICE=${DEVICE}
      - BATCH_SIZE=${BATCH_SIZE}
      - HF_AUTH_TOKEN=${HF_AUTH_TOKEN}
      - METRICS_PORT=${METRICS_PORT}
    volumes:
      - "transcriber_data:/tmp/transcriber"
    depends_on:
      - backend-api
    networks:
      - transcribo-secure-network
    
    deploy:
      resources:
        reservations:
          devices:
            - capabilities: ["gpu"]
    runtime: nvidia
    
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.transcriber.rule=Host(`transcriber.localhost`)"
      - "traefik.http.services.transcriber.loadbalancer.server.port=8000"
      - "traefik.http.routers.transcriber.entrypoints=websecure"
      - "traefik.http.routers.transcriber.tls=true"
    env_file:
      - ".env"


  prometheus:
    image: prom/prometheus:v2.48.1
    container_name: transcribo-secure-prometheus
    volumes:
      - "./infrastructure/docker/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml"
      - "prometheus_data:/prometheus"
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/usr/share/prometheus/console_libraries'
      - '--web.console.templates=/usr/share/prometheus/consoles'
    networks:
      - transcribo-secure-network
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.prometheus.rule=Host(`prometheus.localhost`)"
      - "traefik.http.routers.prometheus.entrypoints=websecure"
      - "traefik.http.routers.prometheus.tls=true"
      - "traefik.http.services.prometheus.loadbalancer.server.port=9090"

  grafana:
    image: grafana/grafana:10.3.0
    container_name: transcribo-secure-grafana
    environment:
      - GF_SECURITY_ADMIN_USER=${GRAFANA_ADMIN_USER}
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD}
      - GF_USERS_ALLOW_SIGN_UP=false
      - POSTGRES_DB=${POSTGRES_DB}
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
    volumes:
      - "grafana_data:/var/lib/grafana"
      - "./infrastructure/docker/grafana/provisioning:/etc/grafana/provisioning"
      - "./infrastructure/docker/grafana/provisioning/plugins:/etc/grafana/provisioning/plugins"
      - "./infrastructure/docker/grafana/provisioning/notifiers:/etc/grafana/provisioning/notifiers"
      - "./infrastructure/docker/grafana/provisioning/alerting:/etc/grafana/provisioning/alerting"
    networks:
      - transcribo-secure-network
    depends_on:
      - postgres
      - prometheus
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.grafana.rule=Host(`grafana.localhost`)"
      - "traefik.http.routers.grafana.entrypoints=websecure"
      - "traefik.http.routers.grafana.tls=true"
      - "traefik.http.services.grafana.loadbalancer.server.port=3000"
    env_file:
      - ".env"

networks:
  transcribo-secure-network:
    name: transcribo-secure-network

volumes:
  prometheus_data:
  grafana_data:
  transcriber_data:
  postgres_data:
