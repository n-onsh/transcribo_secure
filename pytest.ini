[pytest]
minversion = 6.0
# Additional options: use strict markers, show short tracebacks, and quiet output.
addopts = --strict-markers --tb=short -q
# Look for tests only in the tests directory.
testpaths =
    tests
# Consider files with names matching test_*.py as test files.
python_files = test_*.py
# Look for test classes starting with 'Test' and functions starting with 'test_'.
python_classes = Test*
python_functions = test_*
# Do not search in these directories.
norecursedirs = .git venv build dist
